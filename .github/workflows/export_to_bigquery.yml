name: Export to BigQuery

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install asyncpg pandas db-dtypes google-cloud-bigquery

      - name: Write GCP key file
        run: echo '${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}' > /tmp/gcp-key.json

      - name: Run export script
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-key.json
        run: python scripts/export_to_bigquery.py